# Invariant → Test Mapping
# STF-SIR v2 | version: 2.0.0-alpha | generated: 2026-04-12
#
# Every invariant defined in the contract model MUST have at least one test.
# The audit pipeline (Stage-2) reads this file and blocks PRs for 'missing' coverage.
#
# coverage values:
#   full    – automated test covers the invariant completely
#   partial – automated test covers a subset; manual review supplements
#   missing – no test yet (blocks PR if severity = required)

invariants:

  # ─── EPIC-201: Spec v2 ────────────────────────────────────────────────
  - id: INV-201-1
    description: "v1 rules VAL_01–VAL_18 preserved verbatim or superseded"
    severity: required
    tests:
      - script: scripts/audit/lint-spec.sh spec/stf-sir-spec-v2.md
      - cargo: "cargo test conformance -- --test-thread=1"
    coverage: missing  # until spec v2 is written

  - id: INV-201-2
    description: "ZToken v2 is strict superset of v1 field set"
    severity: required
    tests:
      - script: scripts/audit/validate-migration-v1-v2.sh tests/golden/
    coverage: missing

  - id: INV-201-3
    description: "Enricher trait satisfies monotonicity"
    severity: required
    tests:
      - cargo: "PROPTEST_CASES=512 cargo test enricher_monotonicity"
        file: tests/enricher_monotonicity.rs
    coverage: missing

  - id: INV-201-4
    description: "New relation types have exactly one category"
    severity: required
    tests:
      - cargo: "cargo test new_relation_category"
        file: tests/compile_v2.rs
    coverage: missing

