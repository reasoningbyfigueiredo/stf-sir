# Configuration for cargo-deny (supply-chain gate).
# Run locally with:
#     cargo install cargo-deny
#     cargo deny check

[graph]
targets = []

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
# Allow list: only permissive licenses compatible with Apache-2.0.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Reject the deprecated upstream `serde_yaml` crate explicitly. STF-SIR
# uses `serde_yaml_ng` as the supported fork.
deny = [
    { name = "serde_yaml", reason = "upstream archived as v0.9.34+deprecated — use serde_yaml_ng" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
